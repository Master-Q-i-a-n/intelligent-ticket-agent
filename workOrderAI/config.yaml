model:
  chat_model: qwen3-max-2026-01-23
  judge_model: qwen3-next-80b-a3b-instruct
  embedding_model: text-embedding-v4
  reranker_model: qwen3-rerank

router:
  prefix: /ai

MySQL:
  host: localhost
  port: 3306
  user: root
  password: "123456"
  database: work_order

FastAPI:
  host: 0.0.0.0
  port: 8003
  log_level: info

vector_store:
  provider: milvus_lite
  milvus_uri: data/milvus_lite.db
  milvus_metric_type: COSINE
  data_path: data
  knowledge_exclude_paths: ["data/md5_hex_store", "data/milvus_md5_store", "data/external", "data/chroma_db", "data/milvus_lite.db"]
  allow_knowledge_file_types: ["pdf", "docx", "txt"]
  collection_name: rag_collection
  case_memory_collection_name: case_memory_collection
  case_memory_min_score: 0.45
  chunk_size: 200
  chunk_overlap: 20
  k: 3
  separators: ["\n\n", "\n", "。", "！", "？", "!", "?", " ", ""]
  md5_hex_store: data/milvus_md5_store/md5_hex_store.txt
